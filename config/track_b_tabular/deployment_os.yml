$schema: https://azuremlschemas.azureedge.net/latest/managedOnlineDeployment.schema.json

name: repair-classifier-blue
endpoint_name: contoso-repair-classifier
model: azureml:contoso-repair-classifier@latest
code_configuration:
  code: ../../src/track_b_tabular
  scoring_script: score_os.py
environment:
  conda_file: ../../environment/track_b_tabular/deployment_env_os.yml
  image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu22.04:latest
instance_type: Standard_DS2_v2
instance_count: 1
request_settings:
  request_timeout_ms: 3000
  max_concurrent_requests_per_instance: 10
liveness_probe:
  initial_delay: 30
  period: 10
  failure_threshold: 30
